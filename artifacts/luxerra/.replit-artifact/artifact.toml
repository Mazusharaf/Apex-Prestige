kind = "web"
previewPath = "/"
title = "Luxerra – Premium Car Rental"
version = "1.0.0"
id = "artifacts/luxerra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26203

[services.development]
run = "pnpm --filter @workspace/luxerra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luxerra", "run", "build" ]
publicDir = "artifacts/luxerra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26203"
BASE_PATH = "/"
